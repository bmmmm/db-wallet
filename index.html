<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>db-wallet – Start</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { font-size: 1.6rem; margin-bottom: 1rem; }
    input {
      width: 100%; padding: .5rem; font-size: 1rem;
      margin-bottom: .5rem; box-sizing: border-box;
    }
    button {
      padding: .5rem .9rem; font-size: 1rem; cursor: pointer;
    }
    small { color: #666; }
  </style>
</head>
<body>

<h1>Willkommen im db-wallet</h1>

<p>Gib deinen gewünschten Namen ein. Alle Daten bleiben lokal in deinem Browser.</p>

<input id="username" type="text" placeholder="z. B. bartosz, kueche, clubraum …" />
<small>Nur Buchstaben, Zahlen, '-', '_'. Leerzeichen werden '-'</small>
<br><br>
<button id="btn-start">Weiter</button>

<script>
  function normalize(name) {
    let n = name.trim().toLowerCase();
    n = n.replace(/\s+/g, "-");
    n = n.replace(/[^a-z0-9_-]/g, "");
    if (n.startsWith("import:")) n = "user-" + n;
    return n;
  }

  function randomId(len = 6) {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let o = "";
    for (let i = 0; i < len; i++) o += chars[Math.random() * chars.length | 0];
    return o;
  }

  function start() {
    const raw = document.getElementById("username").value;
    let u = normalize(raw);
    if (!u) u = "user-" + randomId();
    window.location.href = "wallet.html#" + u;
  }

  document.getElementById("btn-start").onclick = start;
  document.getElementById("username").addEventListener("keydown", e => {
    if (e.key === "Enter") start();
  });
</script>

</body>
</html>
