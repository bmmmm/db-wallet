<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>db-wallet – Getränke</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    button { padding: .4rem .7rem; margin: .2rem; cursor: pointer; }
    input[type="number"] { width: 5rem; padding: .3rem; }
    #export-url { width: 100%; margin-top: .5rem; padding: .3rem; }
    pre {
      background: #f5f5f5;
      padding: .7rem;
      min-height: 3rem;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
  </style>
</head>
<body>

<h1>dein Getränke-Wallet 🥤</h1>

<div>
  <div>User: <strong id="uid"></strong></div>
  <div>Gesamt getrunken: <strong id="total">0</strong></div>
  <div>Offen seit letzter Zahlung: <strong id="unpaid">0</strong></div>
</div>

<br>

<label for="amount">Menge (Getränke):</label>
<input id="amount" type="number" min="1" value="1">

<br><br>

<button id="btn-drink">+ Trinken 🍺</button>
<button id="btn-minus">– Zurücknehmen ↩️</button>
<button id="btn-pay">Bezahlt 💸</button>

<br><br>

<button id="btn-export">Export-Link erzeugen 🔗</button>
<input id="export-url" readonly placeholder="Hier erscheint dein Export-Link">

<br><br>

<button id="btn-history">Getränke-Historie anzeigen 📊</button>
<button id="btn-reset">Alles löschen 🗑️</button>

<pre id="history">Noch keine Drinks geloggt. ✨</pre>

<script>
(function () {
  const STORAGE_PREFIX = "wallet:";

  function base64UrlEncode(str) {
    return btoa(unescape(encodeURIComponent(str)))
      .replace(/\+/g, "-")
      .replace(/\//g, "_")
      .replace(/=+$/g, "");
  }

  function base64UrlDecode(str) {
    const padLen = (4 - (str.length % 4)) % 4;
    const padded = str + "=".repeat(padLen);
    const base = padded.replace(/-/g, "+").replace(/_/g, "/");
    return decodeURIComponent(escape(atob(base)));
  }

  function randomId(len = 6) {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let out = "";
    for (let i = 0; i < len; i++) {
      out += chars[Math.floor(Math.random() * chars.length)];
    }
    return out;
  }

  function getUserIdFromHash() {
    const hash = window.location.hash.slice(1);
    if (!hash || hash.startsWith("import:")) return null;
    return hash;
  }

  function loadWallet(userId) {
    const raw = localStorage.getItem(STORAGE_PREFIX + userId);
    if (!raw) {
      return { userId, deviceId: randomId(), v: 1, events: [] };
    }
    try {
      const obj = JSON.parse(raw);
      if (!Array.isArray(obj.events)) obj.events = [];
      if (!obj.deviceId) obj.deviceId = randomId();
      obj.userId = userId;
      obj.v = obj.v || 1;
      return obj;
    } catch (e) {
      return { userId, deviceId: randomId(), v: 1, events: [] };
    }
  }

  function saveWallet(wallet) {
    localStorage.setItem(STORAGE_PREFIX + wallet.userId, JSON.stringify(wallet));
  }

  function mergeEvents(localEvents, remoteEvents) {
    const map = new Map();
    for (const e of localEvents || []) {
      if (e && e.id) map.set(e.id, e);
    }
    for (const e of remoteEvents || []) {
      if (e && e.id && !map.has(e.id)) map.set(e.id, e);
    }
    return Array.from(map.values());
  }

  function tryImportFromHash() {
    const hash = window.location.hash.slice(1);
    if (!hash.startsWith("import:")) return null;
    try {
      const payload = base64UrlDecode(hash.slice(7));
      const remote = JSON.parse(payload);
      const userId = remote.userId || ("user-" + randomId());
      const local = loadWallet(userId);
      const mergedEvents = mergeEvents(local.events, remote.events || []);
      const wallet = {
        userId,
        deviceId: local.deviceId || randomId(),
        v: remote.v || local.v || 1,
        events: mergedEvents
      };
      saveWallet(wallet);
      window.location.hash = "#" + userId;
      alert("Getränkedaten importiert ✅");
      return userId;
    } catch (e) {
      alert("Import fehlgeschlagen ❌");
      window.location.hash = "";
      return null;
    }
  }

  function ensureUserId() {
    let userId = tryImportFromHash();
    if (userId) return userId;

    userId = getUserIdFromHash();
    if (!userId) {
      userId = "user-" + randomId();
      window.location.hash = "#" + userId;
    }
    return userId;
  }

  function newEvent(wallet, type, n) {
    return {
      id:
        wallet.deviceId +
        "-" +
        Date.now().toString(36) +
        "-" +
        Math.random().toString(16).slice(2),
      t: type,   // 'd' = drink, 's' = subtract, 'p' = paid
      n: typeof n === "number" ? n : undefined,
      ts: Date.now()
    };
  }

  function computeSummary(wallet) {
    const events = wallet.events
      .slice()
      .sort((a, b) => a.ts - b.ts || a.id.localeCompare(b.id));

    let total = 0;
    const perDayMap = new Map();

    function dayKey(ts) {
      const d = new Date(ts);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    for (const e of events) {
      const key = dayKey(e.ts);
      if (!perDayMap.has(key)) {
        perDayMap.set(key, { date: key, drinks: 0, paid: false });
      }
      const day = perDayMap.get(key);

      if (e.t === "d") {
        const n = e.n || 0;
        total += n;
        day.drinks += n;
      } else if (e.t === "s") {
        const n = e.n || 0;
        total -= n;
        day.drinks -= n;
      } else if (e.t === "p") {
        day.paid = true;
      }
    }

    for (const d of perDayMap.values()) {
      if (d.drinks < 0) d.drinks = 0;
    }
    if (total < 0) total = 0;

    // Unbezahlte Drinks seit letzter Zahlung
    let unpaid = 0;
    let lastPayIndex = -1;
    for (let i = events.length - 1; i >= 0; i--) {
      if (events[i].t === "p") {
        lastPayIndex = i;
        break;
      }
    }
    for (let i = lastPayIndex + 1; i < events.length; i++) {
      const e = events[i];
      if (e.t === "d") unpaid += e.n || 0;
      if (e.t === "s") unpaid -= e.n || 0;
    }
    if (unpaid < 0) unpaid = 0;

    const perDay = Array.from(perDayMap.values()).sort((a, b) =>
      a.date.localeCompare(b.date)
    );

    return { total, unpaid, perDay };
  }

  document.addEventListener("DOMContentLoaded", () => {
    const elUid = document.getElementById("uid");
    const elTotal = document.getElementById("total");
    const elUnpaid = document.getElementById("unpaid");
    const elAmount = document.getElementById("amount");
    const elExportUrl = document.getElementById("export-url");
    const elHistory = document.getElementById("history");

    const btnDrink = document.getElementById("btn-drink");
    const btnMinus = document.getElementById("btn-minus");
    const btnPay = document.getElementById("btn-pay");
    const btnExport = document.getElementById("btn-export");
    const btnHistory = document.getElementById("btn-history");
    const btnReset = document.getElementById("btn-reset");

    const userId = ensureUserId();
    let wallet = loadWallet(userId);

    elUid.textContent = userId;

    function resetAmount() {
      elAmount.value = "1";
    }

    function getAmount() {
      const n = parseInt(elAmount.value, 10);
      return isNaN(n) || n <= 0 ? 1 : n;
    }

    function refreshSummary(showHistory) {
      const summary = computeSummary(wallet);
      elTotal.textContent = summary.total;
      elUnpaid.textContent = summary.unpaid;

      if (showHistory) {
        if (!summary.perDay.length) {
          elHistory.textContent = "Noch keine Drinks geloggt. ✨";
        } else {
          const lines = summary.perDay.map((d) => {
            const bar = "#".repeat(Math.min(d.drinks, 50));
            return `${d.date} | ${bar} (${d.drinks})${d.paid ? " [bezahlt]" : ""}`;
          });
          elHistory.textContent = lines.join("\n");
        }
      }
    }

    btnDrink.addEventListener("click", () => {
      const n = getAmount();
      wallet.events.push(newEvent(wallet, "d", n));
      saveWallet(wallet);
      resetAmount();
      refreshSummary(false);
    });

    btnMinus.addEventListener("click", () => {
      const summaryBefore = computeSummary(wallet);
      const requested = getAmount();
      const maxCancelable = summaryBefore.unpaid; // nur bis zur letzten Zahlung zurück
      const effective = Math.min(requested, maxCancelable);

      if (effective <= 0) {
        alert("Keine offenen Drinks zum Zurücknehmen 🤷‍♂️");
        resetAmount();
        return;
      }

      wallet.events.push(newEvent(wallet, "s", effective));
      saveWallet(wallet);
      resetAmount();
      refreshSummary(false);
    });

    btnPay.addEventListener("click", () => {
      wallet.events.push(newEvent(wallet, "p"));
      saveWallet(wallet);
      resetAmount();
      refreshSummary(false);
    });

    btnExport.addEventListener("click", () => {
      const payload = JSON.stringify({
        userId: wallet.userId,
        v: wallet.v,
        events: wallet.events
      });
      const token = base64UrlEncode(payload);
      const url =
        window.location.origin +
        window.location.pathname +
        "#import:" +
        token;

      elExportUrl.value = url;
      elExportUrl.focus();
      elExportUrl.select();
    });

    // Export-URL: beim Klick direkt alles markieren
    elExportUrl.addEventListener("focus", () => {
      elExportUrl.select();
    });
    elExportUrl.addEventListener("click", () => {
      elExportUrl.select();
    });

    btnHistory.addEventListener("click", () => {
      refreshSummary(true);
    });

    btnReset.addEventListener("click", () => {
      if (!confirm("Wirklich alle Getränkedaten für diesen User löschen? 🗑️")) return;
      localStorage.removeItem(STORAGE_PREFIX + wallet.userId);
      wallet = {
        userId: wallet.userId,
        deviceId: randomId(),
        v: 1,
        events: []
      };
      saveWallet(wallet);
      elExportUrl.value = "";
      elHistory.textContent = "Noch keine Drinks geloggt. ✨";
      resetAmount();
      refreshSummary(false);
    });

    refreshSummary(false);
  });
})();
</script>

</body>
</html>
